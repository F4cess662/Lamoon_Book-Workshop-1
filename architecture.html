<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="System Architecture Diagram - Wholesale Book Store Management System">
    <title>System Architecture | Wholesale Book Store Management System</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        header h1 {
            color: #667eea;
            font-size: 2em;
            margin-bottom: 10px;
        }

        header p {
            color: #666;
            font-size: 1.05em;
        }

        .content {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            overflow-x: auto;
        }

        .mermaid {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 600px;
        }

        .info-section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .info-section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .info-section h3 {
            color: #764ba2;
            margin-top: 20px;
            margin-bottom: 10px;
            font-size: 1.2em;
        }

        .info-section p,
        .info-section li {
            color: #555;
            line-height: 1.8;
            margin-bottom: 10px;
        }

        .info-section ul {
            margin-left: 20px;
        }

        .layer {
            background: #f8f9fa;
            padding: 15px;
            margin: 10px 0;
            border-left: 4px solid #667eea;
            border-radius: 5px;
        }

        .layer strong {
            color: #667eea;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
            border: none;
            cursor: pointer;
            font-size: 0.95em;
        }

        .btn:hover {
            background: #764ba2;
        }

        .btn-back {
            background: #e0e0e0;
            color: #333;
        }

        .btn-back:hover {
            background: #d0d0d0;
        }

        footer {
            text-align: center;
            color: white;
            padding: 20px;
            font-size: 0.9em;
        }

        .component-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .component-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .component-card h4 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .component-card p {
            color: #666;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.5em;
            }

            .content {
                padding: 20px;
            }

            .mermaid {
                min-height: 400px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="nav-buttons">
            <a href="index.html" class="btn btn-back">← กลับไปหน้าแรก | Back to Home</a>
            <a href="README.md" class="btn">📄 README</a>
            <a href="analysis-design.md" class="btn">📊 Analysis & Design</a>
        </div>

        <header>
            <h2 style="color: #764ba2; font-size: 1.2em; font-weight: 300;">ระบบร้านขายหนังสือ</h2>
        </header>

        <div class="content">
            <center><img src="UseCase.png"></center>
        </div>


</body>

</html>
